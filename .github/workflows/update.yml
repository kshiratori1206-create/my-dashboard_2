name: Update Dashboard Data

on:
  schedule:
    - cron: '0 22,3,9 * * *'   # UTC。日本時間 7時/12時/18時に実行
  workflow_dispatch:            # 手動実行ボタンを有効化

permissions:
  contents: write              # data.json をコミットするために必要

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ライブラリをインストール
        run: pip install requests beautifulsoup4 feedparser

      - name: データ収集スクリプトを実行
        run: python scripts/fetch.py

      - name: data.json をコミット
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "update data.json"
          git push
